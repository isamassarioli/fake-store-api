<div class="py-8 px-4 max-w-7xl mx-auto">
  <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">Nossos Produtos</h1>
  
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    @for (product of products; track product.id) {
      <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-lg transition flex flex-col items-center text-center">
        <img [src]="product.image" [alt]="product.title" class="h-40 object-contain mb-4" />
        <h2 class="text-sm font-medium text-gray-700 mb-2 line-clamp-2 min-h-[40px]">{{ product.title }}</h2>
        <p class="text-xl font-bold text-slate-900 mb-4 mt-auto">R$ {{ product.price.toFixed(2) }}</p>
        <a [routerLink]="['/produto', product.id]" class="w-full bg-slate-900 text-white py-2 rounded-lg hover:bg-slate-800 transition">
          Ver Detalhes
        </a>
      </div>
    }
  </div>
</div>
