<div class="flex items-center justify-center min-h-[80vh] bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-md border border-gray-100">
    <h2 class="text-3xl font-bold text-slate-900 text-center mb-6">Acessar Conta</h2>
    
    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">E-mail</label>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-slate-900" 
          placeholder="seuemail@exemplo.com"
          required 
        />
      </div>
      
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-slate-900" 
          placeholder="••••••••"
          required 
        />
      </div>

      @if (errorMessage) {
        <p class="text-red-500 text-sm mb-4 text-center font-medium">{{ errorMessage }}</p>
      }

      <button type="submit" class="w-full bg-slate-900 text-white font-semibold py-3 rounded-xl hover:bg-slate-800 transition">
        Entrar
      </button>
    </form>
  </div>
</div>
