<div class="container mx-auto p-8 max-w-5xl">
  @if (product) {
    <div class="flex flex-col md:flex-row gap-12 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
      <div class="md:w-1/2 flex justify-center bg-gray-50 rounded-xl p-8">
        <img [src]="product.image" [alt]="product.title" class="max-h-96 object-contain mix-blend-multiply" />
      </div>
      <div class="md:w-1/2 flex flex-col justify-center">
        <h1 class="text-3xl font-bold text-gray-900 mb-4">{{ product.title }}</h1>
        <span class="inline-block bg-slate-200 text-slate-800 text-xs font-semibold px-3 py-1 rounded-full mb-4 w-max uppercase tracking-wide">
          {{ product.category }}
        </span>
        <p class="text-gray-600 mb-8 leading-relaxed">{{ product.description }}</p>
        <p class="text-4xl font-black text-slate-900 mb-8">R$ {{ product.price.toFixed(2) }}</p>
        <button class="bg-blue-600 text-white font-bold px-8 py-4 rounded-xl hover:bg-blue-700 transition w-full md:w-max">
          Adicionar ao Carrinho
        </button>
      </div>
    </div>
  }
</div>
